<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #7c6af7;
      --accent2: #f7c36a;
      --text: #e8e8f0;
      --muted: #6b6b7b;
      --danger: #f76a6a;
      --success: #6af7a0;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px 20px;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(124,106,247,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(247,195,106,0.05) 0%, transparent 50%);
    }

    header {
      max-width: 700px;
      margin: 0 auto 48px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo span { color: var(--accent); }

    .tagline {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
      display: flex;
      gap: 12px;
      flex-direction: column;
    }

    .input-row { display: flex; gap: 10px; }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      flex: 1;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 10px 20px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      flex: 1;
      min-width: 120px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-num.accent { color: var(--accent); }
    .stat-num.success { color: var(--success); }
    .stat-num.warn { color: var(--accent2); }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.25s ease;
    }
    .task-item:hover { border-color: #3a3a46; transform: translateX(2px); }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .checkbox.checked::after { content: '✓'; color: #0d0d0f; font-size: 12px; font-weight: bold; }

    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 0.95rem; font-weight: 500; word-break: break-word; }
    .task-desc { font-size: 0.75rem; color: var(--muted); margin-top: 3px; word-break: break-word; }
    .task-date { font-size: 0.65rem; color: var(--border); margin-top: 6px; }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 5px 10px;
      flex-shrink: 0;
    }
    .delete-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(247,106,106,0.07); opacity: 1; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px;
      font-size: 0.85rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 12px 18px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .api-badge {
      display: inline-block;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 6px;
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    #loading {
      text-align: center; color: var(--muted); padding: 32px;
      font-size: 0.8rem; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Task<span>Flow</span></div>
  </div>
  <div>
    <div class="api-badge">▸ API CONNECTED</div>
    <div class="tagline">Gestión de tareas · Docker Demo</div>
  </div>
</header>

<div class="container">

  <div class="add-form">
    <div class="input-row">
      <input type="text" id="titleInput" placeholder="Nueva tarea..." maxlength="120"/>
      <button onclick="addTask()">+ Agregar</button>
    </div>
    <input type="text" id="descInput" placeholder="Descripción (opcional)..." maxlength="255"/>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num accent" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num warn" id="pendingCount">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat">
      <div class="stat-num success" id="doneCount">0</div>
      <div class="stat-label">Completadas</div>
    </div>
  </div>

  <div class="section-title">Tareas</div>
  <div class="task-list" id="taskList">
    <div id="loading">Cargando tareas...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = `http://${location.hostname}:80/api`;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadTasks() {
    try {
      const res = await fetch(`${API}/tasks`);
      const tasks = await res.json();
      renderTasks(tasks);
    } catch(e) {
      document.getElementById('taskList').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div>No se pudo conectar con la API</div>';
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    document.getElementById('totalCount').textContent = tasks.length;
    document.getElementById('pendingCount').textContent = tasks.filter(t => !t.completed).length;
    document.getElementById('doneCount').textContent = tasks.filter(t => t.completed).length;

    if (!tasks.length) {
      list.innerHTML = '<div class="empty"><div class="icon">📋</div>Sin tareas. ¡Agrega una!</div>';
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.completed ? 'done' : ''}" id="task-${t.id}">
        <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTask(${t.id}, ${!t.completed})"></div>
        <div class="task-content">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
          <div class="task-date">${new Date(t.created_at).toLocaleString('es-PA')}</div>
        </div>
        <button class="delete-btn" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function addTask() {
    const title = document.getElementById('titleInput').value.trim();
    const desc  = document.getElementById('descInput').value.trim();
    if (!title) { showToast('⚠️ Escribe un título'); return; }
    await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title, description: desc })
    });
    document.getElementById('titleInput').value = '';
    document.getElementById('descInput').value = '';
    showToast('✅ Tarea agregada');
    loadTasks();
  }

  async function toggleTask(id, completed) {
    await fetch(`${API}/tasks/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ completed })
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    showToast('🗑️ Tarea eliminada');
    loadTasks();
  }

  document.getElementById('titleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  loadTasks();
  setInterval(loadTasks, 30000);
</script>
</body>
</html>
